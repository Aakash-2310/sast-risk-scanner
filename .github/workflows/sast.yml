name: SAST Risk Scan

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history (needed for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SAST using PR SHAs (reliable diff)
        run: |
          mkdir -p reports
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
          python sast_scan.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}" --report reports/github_pr_report.json --verbose

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: reports/github_pr_report.json